<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFCS-BY-ME | VIT Chennai Timetable Builder</title>
  <meta name="description" content="FFCS Timetable Builder for VIT Chennai - Built by Meijeevan K.T" />
  <meta name="author" content="Meijeevan K.T" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    /* ═══════════════ RESET & BASE ═══════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    /* ═══════════════ DARK THEME (DEFAULT) ═══════════════ */
    :root {
      --bg: #0a0a0f;
      --bg-grid: rgba(0, 255, 249, 0.025);
      --surface: #111827;
      --surface2: #1a1a25;
      --surface3: #12121a;
      --border: #2a2a3d;
      --border2: #3a3a55;
      --cyan: #00fff9;
      --cyan-dim: rgba(0, 255, 249, 0.12);
      --cyan-glow: rgba(0, 255, 249, 0.3);
      --pink: #ff00ff;
      --pink-dim: rgba(255, 0, 255, 0.12);
      --pink-glow: rgba(255, 0, 255, 0.3);
      --purple: #9d00ff;
      --purple-dim: rgba(157, 0, 255, 0.12);
      --yellow: #ffd000;
      --yellow-dim: rgba(255, 208, 0, 0.12);
      --green: #00ff66;
      --green-dim: rgba(0, 255, 102, 0.12);
      --green-glow: rgba(0, 255, 102, 0.3);
      --red: #ff3333;
      --red-dim: rgba(255, 51, 51, 0.12);
      --red-glow: rgba(255, 51, 51, 0.3);
      --orange: #ff6600;
      --orange-dim: rgba(255, 102, 0, 0.12);
      --text: #e0e0ff;
      --text2: #a0a0cc;
      --text3: #6060a0;
      --header-bg: rgba(10, 10, 15, 0.92);
      --nav-bg: rgba(17, 24, 39, 0.95);
      --card-bg: linear-gradient(145deg, #1a1a25, #12121a);
      --input-bg: rgba(26, 26, 37, 0.8);
      --th-theory-bg: linear-gradient(180deg, #0d1f3c, #152d5e);
      --th-lab-bg: linear-gradient(180deg, #1a0a30, #2d1060);
      --th-corner-bg: linear-gradient(135deg, #0a0a1a, #1a0a30);
      --th-period-bg: linear-gradient(180deg, #0d1f3c, #0a1530);
      --td-day-bg: linear-gradient(180deg, #0a0a1a, #12122a);
      --td-theory-label-bg: linear-gradient(180deg, #0d1f3c, #152d5e);
      --td-lab-label-bg: linear-gradient(180deg, #1a0a30, #2d1060);
      --td-lunch-bg: linear-gradient(180deg, #1a1500, #252000);
      --sc-bg: #0d0d1a;
      --sc-filled-bg: linear-gradient(160deg, rgba(0, 255, 102, 0.08), rgba(0, 255, 102, 0.04));
      --sc-conflict-bg: linear-gradient(160deg, rgba(255, 51, 51, 0.15), rgba(255, 51, 51, 0.08));
      --sc-dash-bg: #0a0a12;
      --shadow-glow: 0 0 40px rgba(0, 255, 249, 0.05);
      --toast-bg: linear-gradient(135deg, #1a1a25, #12121a);
      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 14px;
      --r-xl: 20px;
      --r-full: 9999px;
      --theme-transition: 0.3s ease;
    }

    /* ═══════════════ LIGHT THEME ═══════════════ */
    .light-theme {
      --bg: #f5f7fa;
      --bg-grid: rgba(0, 0, 0, 0);
      --surface: #ffffff;
      --surface2: #f8f9fc;
      --surface3: #eef0f5;
      --border: #d1d5e0;
      --border2: #b0b8c8;
      --cyan: #0084ff;
      --cyan-dim: rgba(0, 132, 255, 0.1);
      --cyan-glow: rgba(0, 132, 255, 0.2);
      --pink: #d63384;
      --pink-dim: rgba(214, 51, 132, 0.1);
      --pink-glow: rgba(214, 51, 132, 0.2);
      --purple: #6f42c1;
      --purple-dim: rgba(111, 66, 193, 0.1);
      --yellow: #cc9200;
      --yellow-dim: rgba(204, 146, 0, 0.1);
      --green: #198754;
      --green-dim: rgba(25, 135, 84, 0.1);
      --green-glow: rgba(25, 135, 84, 0.2);
      --red: #dc3545;
      --red-dim: rgba(220, 53, 69, 0.1);
      --red-glow: rgba(220, 53, 69, 0.2);
      --orange: #fd7e14;
      --orange-dim: rgba(253, 126, 20, 0.1);
      --text: #1a1a2e;
      --text2: #4a4a6a;
      --text3: #7a7a9a;
      --header-bg: rgba(255, 255, 255, 0.94);
      --nav-bg: rgba(255, 255, 255, 0.94);
      --card-bg: #ffffff;
      --input-bg: #f5f7fa;
      --th-theory-bg: linear-gradient(180deg, #dbeafe, #bfdbfe);
      --th-lab-bg: linear-gradient(180deg, #fce7f3, #fbcfe8);
      --th-corner-bg: linear-gradient(135deg, #e2e8f0, #cbd5e1);
      --th-period-bg: linear-gradient(180deg, #e2e8f0, #cbd5e1);
      --td-day-bg: linear-gradient(180deg, #dbeafe, #bfdbfe);
      --td-theory-label-bg: linear-gradient(180deg, #dbeafe, #bfdbfe);
      --td-lab-label-bg: linear-gradient(180deg, #fce7f3, #fbcfe8);
      --td-lunch-bg: linear-gradient(180deg, #fef9c3, #fef08a);
      --sc-bg: #fafbfd;
      --sc-filled-bg: linear-gradient(160deg, rgba(25, 135, 84, 0.08), rgba(25, 135, 84, 0.04));
      --sc-conflict-bg: linear-gradient(160deg, rgba(220, 53, 69, 0.12), rgba(220, 53, 69, 0.06));
      --sc-dash-bg: #f0f1f5;
      --shadow-glow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --toast-bg: #ffffff;
    }

    /* ═══════════════ SCROLLBAR ═══════════════ */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface3);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--cyan), var(--purple));
      border-radius: 4px;
    }

    ::selection {
      background: rgba(0, 255, 249, 0.25);
      color: #fff;
    }

    /* ═══════════════ BODY ═══════════════ */
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
      transition: background var(--theme-transition), color var(--theme-transition);
      background-image:
        linear-gradient(var(--bg-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* ═══════════════ WATERMARK ═══════════════ */
    .watermark {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9998;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--text3);
      opacity: 0.3;
      pointer-events: none;
      text-align: right;
      line-height: 1.5;
      transition: opacity 0.3s;
    }

    .watermark:hover {
      opacity: 0.7;
    }

    .watermark .wm-line {
      display: block;
      letter-spacing: 1px;
    }

    /* ═══════════════ THEME TOGGLE ═══════════════ */
    .theme-toggle {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: var(--r-full);
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-glow);
    }

    .theme-toggle:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 25px var(--cyan-glow);
      transform: scale(1.1);
    }

    /* ═══════════════ GLOW ORBS ═══════════════ */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
    }

    .glow-cyan {
      width: 400px;
      height: 400px;
      top: -100px;
      left: 10%;
      background: rgba(0, 255, 249, 0.03);
    }

    .glow-purple {
      width: 400px;
      height: 400px;
      bottom: -100px;
      right: 10%;
      background: rgba(157, 0, 255, 0.03);
    }

    .light-theme .glow-orb {
      display: none;
    }

    /* ═══════════════ HEADER ════════���══════ */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-glow);
      transition: background var(--theme-transition);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--cyan-dim), var(--purple-dim));
      border: 1px solid rgba(0, 255, 249, 0.3);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .brand-logo:hover {
      box-shadow: 0 0 30px var(--cyan-glow);
      transform: scale(1.05);
    }

    .brand-name {
      font-family: "Orbitron", sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--cyan);
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .brand-sub {
      font-family: "JetBrains Mono", monospace;
      font-size: 9px;
      color: var(--text3);
      letter-spacing: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--text3);
    }

    .storage-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--green);
      padding: 4px 10px;
      border-radius: var(--r-full);
      border: 1px solid rgba(0, 255, 102, 0.2);
      background: var(--green-dim);
      font-family: "JetBrains Mono", monospace;
    }

    .storage-indicator .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ═══════════════ NAV ═══════════════ */
    .nav-bar {
      position: sticky;
      top: 60px;
      z-index: 90;
      background: var(--nav-bg);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      transition: background var(--theme-transition);
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      padding: 0 20px;
    }

    .nav-tab {
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text3);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      font-family: "Inter", sans-serif;
    }

    .nav-tab svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .nav-tab.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    .nav-tab:hover:not(.active) {
      color: var(--text);
      background: var(--cyan-dim);
    }

    .nav-badge {
      background: var(--red);
      color: #fff;
      border-radius: var(--r-full);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
    }

    /* ═══════════════ MAIN ═══════════════ */
    .main-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 16px 80px;
      position: relative;
      z-index: 1;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ═══════════════ CARDS ═══════════════ */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      transition: all var(--theme-transition);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: "JetBrains Mono", monospace;
      letter-spacing: 0.5px;
    }

    .card-title svg {
      width: 16px;
      height: 16px;
      stroke: var(--cyan);
      fill: none;
      stroke-width: 2;
    }

    /* ═══════════════ FORMS ═══════════════ */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .field-grid.three {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .field label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--text3);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: "JetBrains Mono", monospace;
    }

    .field label .req {
      color: var(--red);
    }

    .field input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      font-size: 13px;
      font-family: "JetBrains Mono", monospace;
      color: var(--text);
      background: var(--input-bg);
      transition: all 0.2s ease;
    }

    .field input:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0, 255, 249, 0.1);
    }

    .edit-input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--cyan);
      border-radius: var(--r-sm);
      font-size: 12px;
      font-family: "JetBrains Mono", monospace;
      color: var(--text);
      background: var(--input-bg);
    }

    /* ═══════════════ SLOT TOGGLE ═══════════════ */
    .slot-toggle-wrap {
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .slot-toggle {
      display: flex;
      gap: 4px;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: var(--r-full);
      padding: 4px;
    }

    .toggle-opt {
      padding: 8px 22px;
      border-radius: var(--r-full);
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: var(--text3);
      transition: all 0.2s ease;
      font-family: "JetBrains Mono", monospace;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toggle-opt svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
    }

    .toggle-opt.theory-on {
      background: linear-gradient(135deg, var(--cyan-dim), var(--purple-dim));
      color: var(--cyan);
      border: 1px solid rgba(0, 255, 249, 0.35);
    }

    .toggle-opt.lab-on {
      background: linear-gradient(135deg, var(--pink-dim), var(--purple-dim));
      color: var(--pink);
      border: 1px solid rgba(255, 0, 255, 0.35);
    }

    .selected-slot-display {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: var(--r-full);
      background: var(--cyan-dim);
      border: 1px solid rgba(0, 255, 249, 0.25);
      color: var(--cyan);
      display: none;
    }

    .selected-slot-display.lab-mode {
      background: var(--pink-dim);
      border-color: rgba(255, 0, 255, 0.25);
      color: var(--pink);
    }

    .selected-slot-display.visible {
      display: inline-block;
    }

    /* ═══════════════ SLOT PANES ═══════════════ */
    .slot-pane {
      display: none;
    }

    .slot-pane.active {
      display: block;
    }

    .slot-group {
      margin-bottom: 14px;
    }

    .slot-group-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      margin-bottom: 7px;
      font-family: "JetBrains Mono", monospace;
    }

    .slot-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .slot-btn {
      padding: 5px 12px;
      font-size: 11.5px;
      font-weight: 600;
      border-radius: var(--r-full);
      border: 1px solid var(--border);
      background: var(--surface3);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: "JetBrains Mono", monospace;
      letter-spacing: 0.2px;
    }

    .slot-btn:hover {
      border-color: rgba(0, 255, 249, 0.4);
      color: var(--cyan);
      background: var(--cyan-dim);
      transform: translateY(-1px);
    }

    .slot-btn.selected {
      background: linear-gradient(135deg, var(--cyan-dim), var(--purple-dim));
      color: var(--cyan);
      border-color: rgba(0, 255, 249, 0.5);
    }

    .lab-pane .slot-btn.selected {
      background: linear-gradient(135deg, var(--pink-dim), var(--purple-dim));
      color: var(--pink);
      border-color: rgba(255, 0, 255, 0.5);
    }

    /* ═══════════════ BUTTONS ═══════════════ */
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: var(--r-md);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface3);
      color: var(--text2);
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: "JetBrains Mono", monospace;
      position: relative;
      overflow: hidden;
    }

    .btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .btn:hover {
      border-color: rgba(0, 255, 249, 0.4);
      color: var(--cyan);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--cyan-dim), var(--purple-dim));
      color: var(--cyan);
      border-color: rgba(0, 255, 249, 0.4);
    }

    .btn.danger-soft {
      background: var(--red-dim);
      color: var(--red);
      border-color: rgba(255, 51, 51, 0.35);
    }

    .btn.success-soft {
      background: var(--green-dim);
      color: var(--green);
      border-color: rgba(0, 255, 102, 0.35);
    }

    .btn.warn-soft {
      background: var(--orange-dim);
      color: var(--orange);
      border-color: rgba(255, 102, 0, 0.3);
    }

    .btn-edit {
      background: rgba(157, 0, 255, 0.1);
      color: var(--purple);
      border-color: rgba(157, 0, 255, 0.3);
      padding: 4px 10px;
      font-size: 11px;
    }

    .btn-save {
      background: var(--green-dim);
      color: var(--green);
      border-color: rgba(0, 255, 102, 0.3);
      padding: 4px 10px;
      font-size: 11px;
    }

    .btn-cancel {
      background: var(--red-dim);
      color: var(--red);
      border-color: rgba(255, 51, 51, 0.3);
      padding: 4px 10px;
      font-size: 11px;
    }

    /* ═══════════════ COURSE LIST ═══════════════ */
    .courses-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 14px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: var(--text3);
      font-size: 13px;
      font-family: "JetBrains Mono", monospace;
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      stroke: var(--text3);
      fill: none;
      stroke-width: 1.5;
      display: block;
      margin: 0 auto 12px;
      opacity: 0.5;
    }

    .course-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      transition: all 0.15s;
    }

    .course-item.conflict-item {
      background: var(--red-dim);
      border-color: rgba(255, 51, 51, 0.35);
      border-left: 3px solid var(--red);
    }

    .ci-code {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--cyan);
      min-width: 110px;
    }

    .ci-slot {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      background: var(--cyan-dim);
      color: var(--cyan);
      padding: 3px 9px;
      border-radius: var(--r-full);
      white-space: nowrap;
    }

    .ci-slot.lab-slot {
      background: var(--pink-dim);
      color: var(--pink);
    }

    .ci-name {
      flex: 1;
      font-size: 12.5px;
      color: var(--text2);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ci-credits {
      font-size: 11px;
      font-weight: 700;
      font-family: "JetBrains Mono", monospace;
      color: var(--text3);
      white-space: nowrap;

    .ci-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 18px;
      padding: 3px 6px;
      border-radius: 4px;

    .ci-del:hover {
      color: var(--red);
      background: var(--red-dim);
    }

    /* ═══════════════ TIMETABLE ═══════════════ */

      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tt-actions .btn-group {
      display: flex;
      gap: 6px;
    }

    .tt-scroll-wrap {
      overflow-x: auto;
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow-glow);
      transition: all var(--theme-transition);

    .tt-table {
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 860px;
      width: 100%;
      font-size: 11px;
    }

    .tt-table td,
    .tt-table th {
      border: 1px solid var(--border);
      padding: 0;
      vertical-align: middle;
      text-align: center;
    }

    .th-time-theory {
      background: var(--th-theory-bg);
      color: var(--cyan);
      font-size: 8px;
      font-weight: 600;
      padding: 5px 3px;
      white-space: nowrap;
      line-height: 1.3;
    }

    .th-time-lab {
      background: var(--th-lab-bg);
      color: var(--pink);
      font-size: 8px;
      font-weight: 600;
      padding: 5px 3px;
      white-space: nowrap;
      line-height: 1.3;
    }

    .th-corner {
      background: var(--th-corner-bg);
      color: var(--cyan);
      font-weight: 700;
      font-size: 11px;
      padding: 6px 4px;
      min-width: 40px;
      width: 40px;
      font-family: "Orbitron", sans-serif;
      letter-spacing: 0.5px;
    }

    .th-corner-label {
      font-size: 7px;
      opacity: 0.5;
      display: block;
      margin-top: 2px;
      font-family: "Inter", sans-serif;
    }

    .th-period {
      background: var(--th-period-bg);
      color: var(--text3);
      font-size: 8px;
      font-weight: 600;
      padding: 3px 2px;
      letter-spacing: 0.5px;
      font-family: "JetBrains Mono", monospace;
    }

    .td-day {
      background: var(--td-day-bg);
      color: var(--cyan);
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 1px;

      width: 36px;
      padding: 4px 2px;

    .td-theory-label {

      color: var(--cyan);

      font-weight: 700;
      width: 46px;
      min-width: 46px;
      padding: 4px 3px;
      font-family: "JetBrains Mono", monospace;

    .td-lab-label {
      background: var(--td-lab-label-bg);
      color: var(--pink);
      font-size: 9px;
      font-weight: 700;
      width: 46px;
      min-width: 46px;
      padding: 4px 3px;
      font-family: "JetBrains Mono", monospace;
    }

    .td-lunch {
      background: var(--td-lunch-bg);
      color: var(--yellow);
      font-weight: 700;
      font-size: 8px;
      letter-spacing: 0.5px;
      padding: 4px 2px;
      width: 36px;
      min-width: 36px;
      font-family: "JetBrains Mono", monospace;
    }

    .sc {

      min-width: 70px;
      width: 70px;
      background: var(--sc-bg);
      transition: background 0.12s;
      padding: 4px 5px;
      position: relative;
      vertical-align: top;

    .sc:hover {
      filter: brightness(1.2);
    }

    .sc.sc-filled {
      background: var(--sc-filled-bg);
      border-color: rgba(0, 255, 102, 0.25) !important;
    }

    .sc.sc-conflict {
      background: var(--sc-conflict-bg);
      border-color: rgba(255, 51, 51, 0.4) !important;
    }

    .sc.sc-dash {
      background: var(--sc-dash-bg);
      opacity: 0.5;
    }

    .sc.sc-theory {
      border-top: 2px solid var(--cyan) !important;
    }

    .sc.sc-lab {
      border-top: 2px solid var(--pink) !important;
    }

    .sc-block {
      font-family: "JetBrains Mono", monospace;
      font-size: 7.5px;
      font-weight: 700;
      color: var(--text3);
      display: block;
      margin-bottom: 1px;
      line-height: 1;
    }

    .sc-code {
      font-size: 9.5px;
      font-weight: 700;
      color: var(--text);
      display: block;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: "JetBrains Mono", monospace;
    }

    .sc-filled .sc-code {
      color: var(--green);
    }

    .sc-conflict .sc-code {
      color: var(--red);
    }

    .sc-name {
      font-size: 7.5px;
      color: var(--text3);
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.2;
      margin-top: 1px;
    }

    .sc-room {
      font-size: 6.5px;
      color: var(--text3);
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.2;
      margin-top: 1px;
      opacity: 0.8;
    }

    .sc-type-badge {
      position: absolute;
      top: 3px;
      right: 3px;
      font-size: 6px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 3px;
      letter-spacing: 0.5px;
      font-family: "JetBrains Mono", monospace;
    }

    .sc-type-badge.theory {
      background: var(--cyan-dim);
      color: var(--cyan);
    }

    .sc-type-badge.lab {
      background: var(--pink-dim);
      color: var(--pink);
    }

      display: inline-block;
      font-size: 7px;
      font-weight: 700;
      background: var(--red);
      color: #fff;
      border-radius: 3px;
      padding: 1px 4px;
      margin-top: 2px;
      font-family: "JetBrains Mono", monospace;
    }

    .tt-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding: 10px 16px;
      font-size: 11px;
      color: var(--text3);

      background: var(--surface3);
      border-radius: 0 0 var(--r-lg) var(--r-lg);
      font-family: "JetBrains Mono", monospace;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
      margin-right: 5px;
      vertical-align: middle;
    }

    .ld-empty {
      background: var(--sc-bg);
      border: 1px solid var(--border);
    }

    .ld-filled {
      background: rgba(0, 255, 102, 0.12);
      border: 1px solid rgba(0, 255, 102, 0.3);
    }

    .ld-conflict {
      background: rgba(255, 51, 51, 0.2);
      border: 1px solid rgba(255, 51, 51, 0.4);
    }

    .ld-lunch {
      background: rgba(255, 208, 0, 0.1);
      border: 1px solid rgba(255, 208, 0, 0.25);

    .ld-theory {
      border-top: 2px solid var(--cyan);
      background: var(--sc-bg);
    }

    .ld-lab {
      border-top: 2px solid var(--pink);
      background: var(--sc-bg);
    }

    /* ═══════════════ SUMMARY ═══════════════ */
    .summary-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .stat-card:hover {
      border-color: rgba(0, 255, 249, 0.25);
    }

    .stat-num {
      font-family: "Orbitron", sans-serif;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      color: var(--cyan);
    }

    .stat-label {
      font-size: 10px;
      color: var(--text3);
      margin-top: 5px;
      font-weight: 600;
      font-family: "JetBrains Mono", monospace;
      letter-spacing: 1px;
    }

    .stat-card.danger-card .stat-num {
      color: var(--red);
    }

    .stat-card.warn-card .stat-num {
      color: var(--orange);
    }

    .result-wrap {
      overflow-x: auto;
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
      min-width: 520px;
    }

    .result-table th {
      color: var(--cyan);
      padding: 10px 12px;
      font-weight: 700;
      text-align: left;
      font-size: 11px;
      font-family: "JetBrains Mono", monospace;
    }

    .result-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .result-table tbody tr:hover td {
      background: var(--cyan-dim);
    }

    .result-table tbody tr.conflict-row td {
      background: var(--red-dim);
      border-left: 3px solid var(--red);
    }

    .result-table tfoot tr td {
      background: linear-gradient(135deg, var(--cyan-dim), var(--purple-dim));
      font-weight: 700;
      font-size: 13px;
      border-top: 2px solid var(--border);
    }

    .slot-pill {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      background: var(--cyan-dim);
      color: var(--cyan);
      padding: 3px 10px;
      border-radius: var(--r-full);
      white-space: nowrap;
      display: inline-block;
    }

    .slot-pill.lab-pill {
      background: var(--pink-dim);
      color: var(--pink);
    }

    /* ═══════════════ ALERTS ═══════════════ */
    .alert {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 15px;
      border-radius: var(--r-md);
      font-size: 13px;
      margin-top: 10px;
    }

    .alert svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .alert-warn {
      background: var(--orange-dim);
      color: var(--orange);
      border: 1px solid rgba(255, 102, 0, 0.3);
    }

    .alert-danger {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(255, 51, 51, 0.3);
    }

    .alert-success {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(0, 255, 102, 0.3);
    }

    /* ═══════════════ TOAST ═══════════════ */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--toast-bg);
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 10px 24px;
      border-radius: var(--r-full);
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 0 30px var(--cyan-glow), 0 10px 40px rgba(0, 0, 0, 0.3);
      transition: transform 0.25s ease;
      z-index: 9999;
      white-space: nowrap;
      pointer-events: none;
      font-family: "JetBrains Mono", monospace;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #toast.warn {
      border-color: var(--red);
      color: var(--red);
    }

    #toast.ok {
      border-color: var(--green);
      color: var(--green);
    }

    /* ═══════════════ FOOTER ═══════════════ */
    .site-footer {
      text-align: center;
      padding: 20px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--text3);
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    .site-footer a {
      color: var(--cyan);
      text-decoration: none;
    }

    /* ═══════════════ RESPONSIVE ═══════════════ */
    @media (max-width: 768px) {
      .header-right {
        display: none;
      }

      .nav-tab {
        padding: 10px 12px;
        font-size: 12px;
      }

      .main-wrap {
        padding: 12px 8px 80px;
      }

      .card {
        padding: 14px;
      }

      .field-grid,
      .field-grid.three {
        grid-template-columns: 1fr;
      }

      .summary-stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .brand-name {
        font-size: 0.85rem;
      }

      .nav-tab .tab-label {
        display: none;
      }

      .btn-row {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

      localStorage.setItem(THEME_KEY, isLight ? "light" : "dark");

    function lsLoad() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) {const p = JSON.parse(raw); if (Array.isArray(p)) return p.map(c => ({...c, hasConflict: false}));}
      } catch (e) { }
      return [];

    /* ═══════════════ HELPERS ═══════════════ */
    function esc(str) {
      if (!str) return "";
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function isTheorySlot(slot) {return !slot.startsWith("L");}

    function getSlotType(slot) {return isTheorySlot(slot) ? "theory" : "lab";}

    function getCourseForBlock(block) {
      if (block === "-" || block === "LUNCH") return null;
      return courses.find(c => c.slots.includes(block)) || null;
    }

    function getUsedSlotsMap() {
      const map = {};
      courses.forEach(c => c.slots.forEach(s => {if (!map[s]) map[s] = []; map[s].push(c.id);}));
      return map;
    }

    function isSlotDuplicate(block) {
      const map = getUsedSlotsMap();
      return map[block] && map[block].length > 1;
    }

    function buildTimeOverlapSet() {
      const overlaps = new Set();
      DAYS.forEach(day => {
        const tBlocks = THEORY_BLOCKS[day], lBlocks = LAB_BLOCKS[day];
        for (let raw = 0; raw < 6; raw++) {
          if (tBlocks[raw] === "-" || lBlocks[raw] === "-") continue;
          if (getCourseForBlock(tBlocks[raw]) && getCourseForBlock(lBlocks[raw])) overlaps.add(day + ":" + raw);
        }
      }

      function buildSlotButtons(containerId, groups, isLab) {
        const cont = document.getElementById(containerId);
        groups.forEach((combo) => {
          const btn = document.createElement("button");
          btn.className = "slot-btn";
          btn.textContent = combo.join(" + ");
          btn.dataset.slots = JSON.stringify(combo);
          btn.addEventListener("click", () => selectSlot(btn, combo));
          cont.appendChild(btn);
        });
      }

      /* ═══════════════════════════════════════════
       TAB NAVIGATION
    ═══════════════════════════════════════════ */
      function switchTab(name, el) {
        document
          .querySelectorAll(".nav-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".panel")
          .forEach((p) => p.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("panel-" + name).classList.add("active");
        if (name === "timetable") renderTimetable();
        if (name === "summary") renderSummary();
      }

      /* ═══════════════════════════════════════════
       SLOT PANE TOGGLE
    ═══════════════════════════════════════════ */
      function showSlotPane(pane) {
        currentPane = pane;
        document
          .getElementById("pane-theory")
          .classList.toggle("active", pane === "theory");
        document
          .getElementById("pane-lab")
          .classList.toggle("active", pane === "lab");
        const tBtn = document.getElementById("btn-theory-toggle");
        const lBtn = document.getElementById("btn-lab-toggle");
        tBtn.classList.toggle("theory-on", pane === "theory");
        tBtn.classList.toggle("lab-on", false);
        lBtn.classList.toggle("lab-on", pane === "lab");
        lBtn.classList.toggle("theory-on", false);
        updateSelectedDisplay();
      }

      /* ═══════════════════════════════════════════
       SLOT SELECTION
    ═══════════════════════════════════════════ */
      function selectSlot(btn, combo) {
        if (btn.classList.contains("selected")) {
          btn.classList.remove("selected");
          selectedSlots = selectedSlots.filter(s => !combo.includes(s));
        } else {
          btn.classList.add("selected");
          selectedSlots = [...selectedSlots, ...combo];
        }
        selectedSlots = [...new Set(selectedSlots)];
        updateSelectedDisplay();
      }

      function updateSelectedDisplay() {
        const el = document.getElementById("selected-slot-display");
        if (selectedSlots.length) {
          el.textContent = "> " + selectedSlots.join(" + ");
          el.classList.add("visible");
          const hasTheory = selectedSlots.some(s => !s.startsWith("L"));
          el.classList.toggle("lab-mode", !hasTheory);
        } else {
          el.classList.remove("visible");
        }
      });
      return overlaps;
    }

    function recalcConflicts() {
      const map = getUsedSlotsMap(), overlaps = buildTimeOverlapSet();
      const ob = new Set();
      DAYS.forEach(day => {
        const tB = THEORY_BLOCKS[day], lB = LAB_BLOCKS[day];
        for (let r = 0; r < tB.length; r++) {
          if (overlaps.has(day + ":" + r)) {
            if (tB[r] !== "LUNCH" && tB[r] !== "-") ob.add(tB[r]);
            if (lB[r] !== "LUNCH" && lB[r] !== "-") ob.add(lB[r]);
          }
        }

        const course = {
          id: Date.now(),
          code,
          name: document.getElementById("inp-name").value.trim(),
          faculty: document.getElementById("inp-faculty").value.trim(),
          room: document.getElementById("inp-room").value.trim(),
          credits: parseInt(document.getElementById("inp-credits").value) || 0,
          slots: [...selectedSlots],
          hasConflict: false,
        };
        courses.push(course);
        recalcConflicts();
        lsSave();
        clearForm();
        renderCoursesList();
        updateBadge();
        if (course.hasConflict) {
          showToast("⚡ " + code + " added — time clash!", "warn");
        } else {
          showToast("✓ " + code + " added", "ok");
        }
      }

      function deleteCourse(id) {
        courses = courses.filter((c) => c.id !== id);
        recalcConflicts();
        lsSave();
        renderCoursesList();
        updateBadge();
        showToast("✓ Course removed", "ok");
      }

      function editCourse(id) {
        const c = courses.find((c) => c.id === id);
        if (!c) return;

        document.getElementById("inp-code").value = c.code;
        document.getElementById("inp-name").value = c.name;
        document.getElementById("inp-faculty").value = c.faculty;
        document.getElementById("inp-room").value = c.room;
        document.getElementById("inp-credits").value = c.credits || "";

        const isLab = c.slots[0].startsWith("L");
        const tBtn = document.getElementById("btn-theory-toggle");
        const lBtn = document.getElementById("btn-lab-toggle");
        
        if (isLab) {
            currentPane = "lab";
            document.getElementById("pane-theory").classList.remove("active");
            document.getElementById("pane-lab").classList.add("active");
            tBtn.classList.remove("theory-on");
            lBtn.classList.add("lab-on");
        } else {
            currentPane = "theory";
            document.getElementById("pane-lab").classList.remove("active");
            document.getElementById("pane-theory").classList.add("active");
            lBtn.classList.remove("lab-on");
            tBtn.classList.add("theory-on");
        }

        document.querySelectorAll(".slot-btn").forEach((b) => b.classList.remove("selected"));
        selectedSlots = [...c.slots];
        c.slots.forEach((s) => {
          document.querySelectorAll(".slot-btn").forEach((btn) => {
            if (btn.getAttribute("onclick") && btn.getAttribute("onclick").includes(`'${s}'`)) {
              btn.classList.add("selected");
            }
          });
        });
        updateSelectedDisplay();

        deleteCourse(id);
        const addTab = Array.from(document.querySelectorAll(".nav-tab")).find(t => t.textContent.includes("Add Course"));
        if (addTab) switchTab("add", addTab);
        
        document.getElementById("inp-code").focus();
        showToast("✏ Edit mode: " + c.code, "ok");
      }

      function clearForm() {
        [
          "inp-code",
          "inp-name",
          "inp-faculty",
          "inp-room",
          "inp-credits",
        ].forEach((id) => (document.getElementById(id).value = ""));
        selectedSlots = [];
        document
          .querySelectorAll(".slot-btn")
          .forEach((b) => b.classList.remove("selected"));
        updateSelectedDisplay();
      }

      function clearAll() {
        if (!courses.length) {
          showToast("⚠ No courses to clear", "warn");
          return;
        }
        if (
          !confirm(
            "Remove ALL " +
              courses.length +
              " course(s) from your timetable?\nThis will also clear localStorage. Cannot be undone.",
          )
        )
          return;
        courses = [];
        lsSave();
        renderCoursesList(); // refresh Add Course tab list
        renderTimetable(); // refresh Timetable tab (clears to empty state)
        renderSummary(); // refresh Summary tab
        updateBadge();
        showToast("✓ All courses cleared", "ok");
      }

      function updateBadge() {
        const badge = document.getElementById("course-count-badge");
        if (courses.length) {
          badge.textContent = courses.length;
          badge.style.display = "inline";
        } else {
          html += `
            <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--cyan)">${esc(c.code)}</td>
            <td>${esc(c.name || "—")}</td>
            <td style="color:var(--text2)">${esc(c.faculty || "—")}</td>
            <td style="color:var(--text2)">${esc(c.room || "—")}</td>
            <td><span class="slot-pill${slotType === "lab" ? " lab-pill" : ""}">${esc(c.slots.join("+"))}</span></td>
            <td><span class="slot-pill${slotType === "lab" ? " lab-pill" : ""}">${slotType.toUpperCase()}</span></td>
            <td style="font-family:'JetBrains Mono',monospace;font-weight:700">${c.credits || "—"}</td>
            <td style="white-space:nowrap">
              <button class="btn btn-edit" onclick="startEditCourse(${c.id})">✎</button>
              <button class="btn btn-cancel" onclick="deleteCourse(${c.id})" style="padding:4px 8px">🗑</button>
            </td>`;
        }
        let html = '<div class="courses-list">';
        courses.forEach((c) => {
          html += `<div class="course-item${c.hasConflict ? " conflict-item" : ""}">
      <span class="ci-code">${esc(c.code)}</span>
      <span class="ci-slot">${esc(c.slots.join("+"))}</span>
      <span class="ci-name">${esc(c.name || "—")}</span>
      ${c.credits ? `<span class="ci-credits">${c.credits} cr</span>` : ""}
      <button class="ci-edit" onclick="editCourse(${c.id})" aria-label="Edit" style="background:none;border:none;color:var(--cyan);cursor:pointer;padding:0 4px;margin-left:auto;">✏</button>
      <button class="ci-del" onclick="deleteCourse(${c.id})" aria-label="Remove">×</button>
    </div>`;
        });
        html += "</div>";
        cont.innerHTML = html;
      }

      /* ═══════════════════════════════════════════
       TIMETABLE RENDER
    ═══════════════════════════════════════════ */
      function getCourseForBlock(block) {
        if (block === "-" || block === "LUNCH") return null;
        return courses.find((c) => c.slots.includes(block)) || null;
      }

      function isSlotDuplicate(block) {
        const map = getUsedSlotsMap();
        return map[block] && map[block].length > 1;
      }

      function renderTimetable() {
        const cont = document.getElementById("tt-container");
        if (!courses.length) {
          cont.innerHTML = `<div class="card"><div class="empty-state">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      <p>// NO_COURSES_FOUND</p>
      <p style="margin-top:6px;font-size:11px">Add courses to populate your timetable</p>
    </div></div>`;
          return;
        }

        const overlaps = buildTimeOverlapSet();

        let html = `<div class="tt-scroll-wrap"><table class="tt-table" role="grid">
  <thead><tr>
    <th class="th-corner" rowspan="3">DAY<span class="th-corner-label">↔ scroll</span></th>
    <th class="th-corner" rowspan="3" style="min-width:50px;width:50px;padding:4px 3px;line-height:1.4;">
      <span style="display:block;font-size:8px;font-weight:800;color:var(--cyan);font-family:'JetBrains Mono',monospace;letter-spacing:.4px;text-shadow:0 0 6px var(--cyan-glow);">Theory</span>
      <span style="display:block;font-size:9px;color:var(--border2);line-height:1;margin:2px 0;">─────</span>
      <span style="display:block;font-size:8px;font-weight:800;color:var(--pink);font-family:'JetBrains Mono',monospace;letter-spacing:.4px;text-shadow:0 0 6px var(--pink-glow);">Lab</span>
    </th>`;

        // Theory timing headers
        for (let i = 0; i < 6; i++)
          html += `<th class="th-time-theory">${THEORY_TIMES[i]}<br>–${THEORY_TIMES_END[i]}</th>`;
        html += `<th class="td-lunch" rowspan="3" style="font-size:8px;width:34px;min-width:34px">🍽<br>LUNCH</th>`;
        for (let i = 7; i < 13; i++)
          html += `<th class="th-time-theory">${THEORY_TIMES[i]}<br>–${THEORY_TIMES_END[i]}</th>`;
        html += `</tr><tr>`;

        // Lab timing headers
        for (let i = 0; i < 6; i++)
          html += `<th class="th-time-lab">${LAB_TIMES[i]}<br>–${LAB_TIMES_END[i]}</th>`;
        for (let i = 7; i < 13; i++)
          html += `<th class="th-time-lab">${LAB_TIMES[i]}<br>–${LAB_TIMES_END[i]}</th>`;
        html += `</tr><tr>`;

        // Period numbers
        for (let i = 0; i < 6; i++)
          html += `<th class="th-period">P${i + 1}</th>`;
        for (let i = 7; i < 13; i++)
          html += `<th class="th-period">P${i - 1}</th>`;
        html += `</tr></thead><tbody>`;

        DAYS.forEach((day) => {
          const tBlocks = THEORY_BLOCKS[day];
          const lBlocks = LAB_BLOCKS[day];

          // Theory row
          html += `<tr><td class="td-day" rowspan="2">${day}</td><td class="td-theory-label">Theory</td>`;
          tBlocks.forEach((block, raw) => {
            if (block === "LUNCH") {
              html += `<td class="sc" style="background:transparent;border:none;"></td>`;
              return;
            }
            if (block === "-") {
              html += `<td class="sc sc-dash"><span class="sc-block" style="color:#2a2a3d">—</span></td>`;
              return;
            }
            const course = getCourseForBlock(block);
            const dupConf = isSlotDuplicate(block);
            const timeOver = overlaps.has(day + ":" + raw);
            let cls = "sc";
            if (dupConf || timeOver) cls += " sc-conflict";
            else if (course) cls += " sc-filled";
            const tip =
              timeOver && course
                ? ' title="⚡ Theory + Lab overlap at this hour"'
                : "";
            html += `<td class="${cls}"${tip}>
        <span class="sc-block">${esc(block)}</span>
        ${course ? `<span class="sc-code">${esc(course.code)}</span>` : ""}
        ${course && course.name ? `<span class="sc-name">${esc(course.name)}</span>` : ""}
        ${timeOver && course ? `<span class="sc-overlap-tag">⚡CLASH</span>` : ""}
      </td>`;
          });
          html += `</tr>`;

          // Lab row
          html += `<tr><td class="td-lab-label">Lab</td>`;
          lBlocks.forEach((block, raw) => {
            if (block === "LUNCH") {
              html += `<td class="sc" style="background:transparent;border:none;"></td>`;
              return;
            }
            const course = getCourseForBlock(block);
            const dupConf = isSlotDuplicate(block);
            const timeOver = overlaps.has(day + ":" + raw);
            let cls = "sc";
            if (dupConf || timeOver) cls += " sc-conflict";
            else if (course) cls += " sc-filled";
            const tip =
              timeOver && course
                ? ' title="⚡ Theory + Lab overlap at this hour"'
                : "";
            html += `<td class="${cls}"${tip}>
        <span class="sc-block">${esc(block)}</span>
        ${course ? `<span class="sc-code">${esc(course.code)}</span>` : ""}
        ${course && course.name ? `<span class="sc-name">${esc(course.name)}</span>` : ""}
        ${timeOver && course ? `<span class="sc-overlap-tag">⚡CLASH</span>` : ""}
      </td>`;
          });
          html += `</tr>`;
        });

        html += `</tbody></table>
  <div class="tt-legend">
    <span><span class="legend-dot ld-empty"></span>Empty</span>
    <span><span class="legend-dot ld-filled"></span>Scheduled</span>
    <span><span class="legend-dot ld-conflict"></span>Conflict / Clash</span>
    <span><span class="legend-dot ld-lunch"></span>Lunch</span>
  </div></div>`;

        cont.innerHTML = html;
      }

      /* ═══════════════════════════════════════════
       SUMMARY RENDER
    ═══════════════════════════════════════════ */
      function renderSummary() {
        const cont = document.getElementById("summary-container");
        if (!courses.length) {
          cont.innerHTML = `<div class="card"><div class="empty-state">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
      <p>// NO_COURSES_FOUND</p>
    </div></div>`;
          return;
        }
        recalcConflicts();
        const totalCr = courses.reduce((s, c) => s + (c.credits || 0), 0);
        const nConflict = courses.filter((c) => c.hasConflict).length;
        const nLabs = courses.filter((c) =>
          c.slots.some((s) => s.startsWith("L")),
        ).length;

        let html = `<div class="summary-stats">
    <div class="stat-card">
      <div class="stat-num">${courses.length}</div>
      <div class="stat-label">COURSES</div>
    </div>
    <div class="stat-card${totalCr > 30 ? " danger-card" : totalCr > 25 ? " warn-card" : ""}">
      <div class="stat-num">${totalCr}</div>
      <div class="stat-label">CREDITS</div>
    </div>
    <div class="stat-card${nConflict > 0 ? " danger-card" : ""}">
      <div class="stat-num">${nConflict}</div>
      <div class="stat-label">CONFLICTS</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--pink);text-shadow:0 0 10px var(--pink-glow)">${nLabs}</div>
      <div class="stat-label">LABS</div>
    </div>
  </div>`;

        html += `<div class="result-wrap"><table class="result-table">
    <thead><tr>
      <th>#</th><th>CODE</th><th>NAME</th>
      <th>FACULTY</th><th>ROOM</th><th>SLOTS</th><th>CR</th>
    </tr></thead><tbody>`;

        courses.forEach((c, i) => {
          html += `<tr class="${c.hasConflict ? "conflict-row" : ""}">
      <td style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px">${i + 1}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--cyan)">${esc(c.code)}</td>
      <td>${esc(c.name || "—")}</td>
      <td style="color:var(--text2)">${esc(c.faculty || "—")}</td>
      <td style="color:var(--text2)">${esc(c.room || "—")}</td>
      <td><span class="slot-pill">${esc(c.slots.join("+"))}</span></td>
      <td style="font-family:'JetBrains Mono',monospace;font-weight:700">${c.credits || "—"}</td>
    </tr>`;
        });

        html += `</tbody><tfoot><tr>
    <td colspan="6" style="text-align:right;padding-right:16px;color:var(--text3);font-size:11px;font-family:'JetBrains Mono',monospace">TOTAL_CREDITS</td>
    <td style="font-family:'JetBrains Mono',monospace;font-weight:800;color:${totalCr > 30 ? "var(--red)" : "var(--cyan)"};text-shadow:0 0 8px ${totalCr > 30 ? "var(--red-glow)" : "var(--cyan-glow)"};">${totalCr}</td>
  </tr></tfoot></table></div>`;

        if (totalCr > 30) {
          html += `<div class="alert alert-danger"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <div><strong>CREDIT_OVERLOAD:</strong> ${totalCr} credits exceeds the 30-credit cap. Drop a course.</div></div>`;
        } else if (totalCr > 25) {
          html += `<div class="alert alert-warn"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <div><strong>WARNING:</strong> High credit load — ${totalCr}/30 credits.</div></div>`;
        }
        if (nConflict > 0) {
          html += `<div class="alert alert-danger" style="margin-top:8px"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <div><strong>${nConflict} CONFLICT${nConflict > 1 ? "S" : ""}_DETECTED:</strong> Red rows = duplicate slots or Theory/Lab time clash. Check Timetable tab for ⚡CLASH markers.</div></div>`;
        }
        if (nConflict === 0 && totalCr <= 30 && courses.length) {
          html += `<div class="alert alert-success"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <div><strong>STATUS_OK:</strong> No conflicts. Credits within limit. Your timetable is ready.</div></div>`;
        }
        cont.innerHTML = html;
      }

      /* ═══════════════════════════════════════════
       DOWNLOAD / COPY
    ═══════════════════════════════════════════ */
      function buildTextSummary() {
        const line = "═".repeat(55);
        let txt = `FFCS-BY-ME // VIT CHENNAI TIMETABLE\n${line}\n\n`;
        courses.forEach((c, i) => {
          txt += `${i + 1}. ${c.code}${c.name ? " — " + c.name : ""}\n`;
          txt += `   Slot    : ${c.slots.join(" + ")}\n`;
          if (c.faculty) txt += `   Faculty : ${c.faculty}\n`;
          if (c.room) txt += `   Room    : ${c.room}\n`;
          if (c.credits) txt += `   Credits : ${c.credits}\n`;
          if (c.hasConflict) txt += `   ⚡ CONFLICT DETECTED\n`;
          txt += "\n";
        });
        const total = courses.reduce((s, c) => s + (c.credits || 0), 0);
        txt += `${line}\nTotal Credits : ${total}${total > 30 ? " ⚠ EXCEEDS 30!" : ""}\nCourses       : ${courses.length}\n`;
        return txt;
      }

      function downloadTimetable() {
        const txt = buildTextSummary();
        const blob = new Blob([txt], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "FFCS-timetable.txt";
        a.click();
        showToast("✓ Downloaded", "ok");
      }

      function copyToClipboard() {
        navigator.clipboard
          .writeText(buildTextSummary())
          .then(() => showToast("✓ Copied!", "ok"))
          .catch(() => showToast("⚠ Copy failed", "warn"));
      }

      /* ═══════════════════════════════════════════
       UTILS
    ═══════════════════════════════════════════ */
      function esc(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      let toastTimer;
      function showToast(msg, type) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = type || "";
        t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
      }

</html>
